name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:  # Allow manual triggering

permissions:
  id-token: write
  contents: read
  issues: write  # For creating drift detection issues

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [terraform-eu-west-2]  # Add other environments as needed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}
          role-session-name: terraform-drift-${{ matrix.environment }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: modules/ecs-fargate
        run: terraform init

      - name: Detect Drift
        working-directory: modules/ecs-fargate
        run: |
          terraform plan -var-file="../../environments/${{ matrix.environment }}/terraform.tfvars" -detailed-exitcode -no-color > drift_output.txt 2>&1
          exit_code=$?
          echo "drift_detected=$exit_code" >> $GITHUB_OUTPUT
          
          if [ $exit_code -eq 2 ]; then
            echo "::warning::Infrastructure drift detected in ${{ matrix.environment }}!"
          elif [ $exit_code -eq 1 ]; then
            echo "::error::Terraform plan failed in ${{ matrix.environment }}"
          else
            echo "::notice::No drift detected in ${{ matrix.environment }}"
          fi
        id: drift
        continue-on-error: true

      - name: Create Drift Issue
        if: steps.drift.outputs.drift_detected == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const environment = '${{ matrix.environment }}';
            
            let driftOutput = '';
            try {
              driftOutput = fs.readFileSync(`modules/ecs-fargate/drift_output.txt`, 'utf8');
            } catch (error) {
              driftOutput = 'Drift output not available';
            }

            const issueTitle = `🚨 Infrastructure Drift Detected - ${environment.toUpperCase()}`;
            const issueBody = `## Infrastructure Drift Alert
            
            **Environment:** ${environment}
            **Detection Time:** ${new Date().toISOString()}
            
            ### Drift Details
            \`\`\`terraform
            ${driftOutput}
            \`\`\`
            
            ### Action Required
            - [ ] Review the drift changes
            - [ ] Determine if changes should be imported or reverted
            - [ ] Update Terraform configuration if needed
            - [ ] Apply corrective actions
            
            ### Troubleshooting
            1. Check if manual changes were made to infrastructure
            2. Review recent AWS console activity
            3. Consider if drift is expected (e.g., auto-scaling actions)
            
            **Auto-generated by:** Terraform Drift Detection Workflow`;

            // Check if similar issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'infrastructure-drift'
            });

            const existingIssue = issues.find(issue => 
              issue.title.includes(`Infrastructure Drift Detected - ${environment.toUpperCase()}`)
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['infrastructure-drift', `environment:${environment}`, 'priority:medium']
              });
            } else {
              // Update existing issue with new drift information
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `### New Drift Detection - ${new Date().toISOString()}\n\n\`\`\`terraform\n${driftOutput}\n\`\`\``
              });
            }